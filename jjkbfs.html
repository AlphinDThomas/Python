<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEDxAJCE 2026 — ORIGIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --red: #E62B1E
    }

    html,
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%
    }

    body {
      cursor: none
    }

    #cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .2s, height .2s
    }

    #cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(230, 43, 30, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%)
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05)
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      line-height: 1
    }

    .nav-logo span {
      color: var(--red)
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s
    }

    .nav-links a:hover {
      color: #fff
    }

    .nav-links .register {
      border: 1px solid var(--red);
      color: var(--red);
      padding: 7px 20px;
      border-radius: 2px;
      transition: background .2s, color .2s
    }

    .nav-links .register:hover {
      background: var(--red);
      color: #fff
    }

    #hero {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 12vw, 140px);
      letter-spacing: 8px;
      line-height: 0.92;
      text-align: center;
      text-shadow: 0 0 80px rgba(230, 43, 30, 0.25)
    }

    .hero-title .red {
      color: var(--red)
    }

    .hero-year {
      font-size: 13px;
      letter-spacing: 14px;
      opacity: 0.45;
      margin-top: 14px;
      text-transform: uppercase
    }

    .hero-origin {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(26px, 3.5vw, 40px);
      color: var(--red);
      letter-spacing: 18px;
      margin-top: 18px
    }

    .hero-tagline {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-top: 14px
    }

    .scroll-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.35;
      animation: bounce 2.2s ease-in-out infinite;
      z-index: 10
    }

    .scroll-hint span {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase
    }

    .scroll-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.7))
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      50% {
        transform: translateX(-50%) translateY(8px)
      }
    }

    @media(max-width:768px) {
      nav {
        padding: 0 20px
      }

      .nav-links {
        gap: 16px
      }

      .nav-links a:not(.register) {
        display: none
      }
    }
  </style>
</head>

<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <div class="nav-logo">TEDx<span>AJCE</span></div>
    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Speakers</a>
      <a href="#">Schedule</a>
      <a href="#" class="register">Register</a>
    </div>
  </nav>

  <div id="hero">
    <div class="hero-title">
      <div>TED<span class="red">x</span></div>
      <div class="red">AJCE</div>
    </div>
    <div class="hero-year">2 0 2 6</div>
    <div class="hero-origin">— ORIGIN —</div>
    <div class="hero-tagline">Discover the Origins of Ideas</div>
  </div>

  <div class="scroll-hint">
    <span>Scroll to Explore</span>
    <div class="scroll-line"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    // ── CURSOR ──────────────────────────────────────────────────
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = -200, my = -200, rx = -200, ry = -200;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function tickCursor() {
      rx += (mx - rx) * 0.11; ry += (my - ry) * 0.11;
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(tickCursor);
    })();
    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => { cursor.style.width = '14px'; cursor.style.height = '14px'; ring.style.width = '50px'; ring.style.height = '50px'; });
      el.addEventListener('mouseleave', () => { cursor.style.width = '8px'; cursor.style.height = '8px'; ring.style.width = '36px'; ring.style.height = '36px'; });
    });

    // ── THREE.JS ────────────────────────────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    function onResize() {
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
    }
    onResize();
    window.addEventListener('resize', onResize);

    // ── CENTRAL ORB — 9000 particles ────────────────────────────
    const ORB = 9000;
    const oGeo = new THREE.BufferGeometry();
    const oPos = new Float32Array(ORB * 3);
    const oCol = new Float32Array(ORB * 3);
    for (let i = 0; i < ORB; i++) {
      const r = 1.9 * Math.pow(Math.random(), 0.38);
      const th = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      oPos[i * 3] = r * Math.sin(phi) * Math.cos(th) + (Math.random() - .5) * .5;
      oPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(th) + (Math.random() - .5) * .5;
      oPos[i * 3 + 2] = r * Math.cos(phi) + (Math.random() - .5) * .5;
      if (Math.random() < 0.62) { oCol[i * 3] = 1; oCol[i * 3 + 1] = 1; oCol[i * 3 + 2] = 1; }
      else { oCol[i * 3] = 0.902; oCol[i * 3 + 1] = 0.169; oCol[i * 3 + 2] = 0.118; }
    }
    oGeo.setAttribute('position', new THREE.BufferAttribute(oPos, 3));
    oGeo.setAttribute('color', new THREE.BufferAttribute(oCol, 3));
    const oMat = new THREE.PointsMaterial({ size: 0.013, vertexColors: true, transparent: true, opacity: 0.88 });
    const oMesh = new THREE.Points(oGeo, oMat);
    scene.add(oMesh);

    // ── AMBIENT DUST — 5000 wide-spread particles ────────────────
    const DUST = 5000;
    const dGeo = new THREE.BufferGeometry();
    const dPos = new Float32Array(DUST * 3);
    const dCol = new Float32Array(DUST * 3);
    for (let i = 0; i < DUST; i++) {
      dPos[i * 3] = (Math.random() - .5) * 44;
      dPos[i * 3 + 1] = (Math.random() - .5) * 26;
      dPos[i * 3 + 2] = (Math.random() - .5) * 32;
      const isRed = Math.random() < 0.4;
      if (isRed) { const v = 0.55 + Math.random() * .45; dCol[i * 3] = .902 * v; dCol[i * 3 + 1] = .169 * v; dCol[i * 3 + 2] = .118 * v; }
      else { const v = 0.4 + Math.random() * .6; dCol[i * 3] = v; dCol[i * 3 + 1] = v; dCol[i * 3 + 2] = v; }
    }
    dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
    dGeo.setAttribute('color', new THREE.BufferAttribute(dCol, 3));
    const dMat = new THREE.PointsMaterial({ size: 0.032, vertexColors: true, transparent: true, opacity: 0.72 });
    const dMesh = new THREE.Points(dGeo, dMat);
    scene.add(dMesh);

    // ── FOREGROUND CLOSE DUST — 1000 big particles ───────────────
    const FG = 1000;
    const fGeo = new THREE.BufferGeometry();
    const fPos = new Float32Array(FG * 3);
    const fCol = new Float32Array(FG * 3);
    for (let i = 0; i < FG; i++) {
      fPos[i * 3] = (Math.random() - .5) * 14;
      fPos[i * 3 + 1] = (Math.random() - .5) * 9;
      fPos[i * 3 + 2] = 1 + Math.random() * 3.5;
      if (Math.random() < 0.5) { fCol[i * 3] = 1; fCol[i * 3 + 1] = 1; fCol[i * 3 + 2] = 1; }
      else { fCol[i * 3] = .902; fCol[i * 3 + 1] = .169; fCol[i * 3 + 2] = .118; }
    }
    fGeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
    fGeo.setAttribute('color', new THREE.BufferAttribute(fCol, 3));
    const fMat = new THREE.PointsMaterial({ size: 0.055, vertexColors: true, transparent: true, opacity: 0.30 });
    const fMesh = new THREE.Points(fGeo, fMat);
    scene.add(fMesh);

    // ── ORBITAL RINGS ────────────────────────────────────────────
    function mkRing(r, thick, col, op, rx, ry, rz) {
      const g = new THREE.TorusGeometry(r, thick, 4, 140);
      const m = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: op, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(g, m);
      mesh.rotation.set(rx, ry, rz);
      return mesh;
    }
    const ring1 = mkRing(2.25, 0.012, 0xffffff, 0.24, Math.PI / 4, 0.28, 0);
    const ring2 = mkRing(3.00, 0.010, 0xE62B1E, 0.20, Math.PI / 5, -0.52, 0.3);
    const ring3 = mkRing(1.75, 0.008, 0xffffff, 0.16, Math.PI * .72, 0.82, 0.1);
    const rings = new THREE.Group();
    rings.add(ring1, ring2, ring3);
    scene.add(rings);

    // ── MOUSE ────────────────────────────────────────────────────
    let mnx = 0, mny = 0;
    document.addEventListener('mousemove', e => {
      mnx = (e.clientX / innerWidth - .5) * 2;
      mny = (e.clientY / innerHeight - .5) * 2;
    });

    // ── RENDER LOOP ──────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Orb: continuous spin
      oMesh.rotation.y += 0.0045;
      oMesh.rotation.x += 0.0018;

      // Dust: global slow rotation
      dMesh.rotation.y -= 0.0012;
      dMesh.rotation.x += 0.0004;

      // Dust Z drift — particles fly toward viewer continuously
      const dp = dGeo.attributes.position;
      for (let i = 0; i < DUST; i += 3) {
        dp.array[i * 3 + 2] += 0.006;
        if (dp.array[i * 3 + 2] > 16) dp.array[i * 3 + 2] = -16;
      }
      dp.needsUpdate = true;

      // Foreground dust: faster drift
      const fp = fGeo.attributes.position;
      for (let i = 0; i < FG; i++) {
        fp.array[i * 3 + 2] += 0.012;
        if (fp.array[i * 3 + 2] > 5.5) fp.array[i * 3 + 2] = -3.5;
      }
      fp.needsUpdate = true;

      // Rings: each axis rotates independently at different speeds
      ring1.rotation.z += 0.007;
      ring1.rotation.x += 0.0012;
      ring2.rotation.z -= 0.005;
      ring2.rotation.y += 0.004;
      ring3.rotation.z += 0.010;
      ring3.rotation.x -= 0.0025;
      rings.rotation.y += 0.0008;

      // Camera: gentle mouse parallax only (no scroll)
      camera.position.x += (mnx * 0.45 - camera.position.x) * 0.04;
      camera.position.y += (-mny * 0.22 - camera.position.y) * 0.04;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
